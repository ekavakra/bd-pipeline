# BD Pipeline — E2E Tests
# Runs Playwright tests against a full Docker Compose environment.

name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '9'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Start services
      - name: Start Docker Compose
        run: docker compose up -d postgres redis

      - name: Wait for services
        run: |
          timeout 30 bash -c 'until docker compose exec -T postgres pg_isready; do sleep 1; done'

      # Set up database
      - name: Setup database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bd_pipeline
        run: |
          pnpm --filter @bd-pipeline/db exec prisma generate
          pnpm --filter @bd-pipeline/db exec prisma db push --skip-generate
          pnpm --filter @bd-pipeline/db exec prisma db seed

      # Install Playwright browsers
      - run: pnpm --filter e2e exec playwright install --with-deps chromium

      # Start backend and frontend
      - name: Start backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bd_pipeline
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: e2e-test-jwt-secret-at-least-32-chars-long!!
          JWT_REFRESH_SECRET: e2e-test-refresh-secret-at-least-32-chars!!
          PORT: 3001
          NODE_ENV: test
        run: pnpm --filter @bd-pipeline/api dev &

      - name: Start frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
        run: pnpm --filter @bd-pipeline/web dev &

      - name: Wait for servers
        run: |
          timeout 60 bash -c 'until curl -s http://localhost:3001/api/v1/health > /dev/null; do sleep 1; done'
          timeout 60 bash -c 'until curl -s http://localhost:3000 > /dev/null; do sleep 1; done'

      # Run E2E tests
      - run: pnpm --filter e2e test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/

      - name: Cleanup
        if: always()
        run: docker compose down -v
