# ============================================
# BD Pipeline — Docker Compose (Production)
# Run: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================

services:
  backend:
    build:
      target: production
    volumes: []  # No source mounts in prod
    restart: always

  worker:
    build:
      target: production
    volumes: []
    restart: always

  frontend:
    build:
      target: production
    volumes: []
    restart: always

  nginx:
    image: nginx:alpine
    container_name: bd-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - bd-network
